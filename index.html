<!DOCTYPE html>
<html lang="zh" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>YUAN JINHUI PORTFOLIO</title>
  <style>
    /* ===================================================
       完整自包含演示版 — 所有样式内联
       =================================================== */
    :root {
      --font: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      --bg: #fff;
      --text: #000;
      --muted: #888;
      --border: #e0e0e0;
      --header: 48px;
      --gap: 2px;
      --ease: cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    a { color: inherit; text-decoration: none; }
    img, video { display: block; max-width: 100%; }

    /* ---- Header ---- */
    .site-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--header);
      z-index: 100;
      display: flex;
      align-items: center;
      padding: 0 20px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      gap: 24px;
    }
    .logo {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }
    .main-nav { display: flex; gap: 20px; flex: 1; }
    .nav-link {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      transition: color 0.25s;
      padding-bottom: 2px;
    }
    .nav-link:hover, .nav-link.active {
      color: var(--text);
      border-bottom: 1px solid var(--text);
    }
    .lang-toggle {
      margin-left: auto;
      font-size: 10px;
      font-family: var(--font);
      letter-spacing: 0.1em;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      cursor: pointer;
      padding: 3px 8px;
      border-radius: 2px;
      transition: all 0.2s;
    }
    .lang-toggle:hover { border-color: var(--text); color: var(--text); }

    /* ---- Grid — 仿 twinbrainsfilms 全屏布局 ---- */
    .main-content { margin-top: var(--header); flex: 1; padding-bottom: 60px; }
    .projects-grid {
      display: block;
      /* 全屏铺满，移除最大宽度限制 */
    }

    /* 单格 — 全宽 */
    .project-cell.single {
      position: relative;
      overflow: hidden;
      background: #111;
      cursor: none;
      height: 633px;
      width: 100%;
    }
    /* 双格行 — 两个半宽并排 */
    .project-row.double {
      display: flex;
      height: 633px;
      gap: 2px;
    }
    .project-cell.half {
      position: relative;
      overflow: hidden;
      background: #111;
      cursor: none;
      flex: 1;
      height: 100%;
    }
    /* 竖屏格 — 单格占满，宽度 640px，左居中，竖版比例 */
    .project-cell.tall {
      position: relative;
      overflow: hidden;
      background: #111;
      cursor: none;
      width: 640px;
      height: 880px;
      margin: 0 auto;
    }

    /* ---- Project Cell (通用) ---- */
    .project-cell { aspect-ratio: unset; }
    .cell-media {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: opacity 0.3s var(--ease), transform 0.6s var(--ease);
    }
    /* 竖屏视频特殊处理：保持完整比例，不裁切 */
    .project-cell.tall .cell-media {
      object-fit: contain;
      background: #000;
    }
    /* 视频2/3/11等可能有黑边的视频，强制铺满 */
    .project-cell.fill .cell-media {
      object-fit: fill;
    }
    .project-cell:hover .cell-media {
      transform: scale(1.03);
    }
    /* hover时启用差值混合模式（类似视频编辑软件里的差值效果） */
    .cell-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
    }
    .cell-placeholder-bg {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    /* 彩色渐变占位 */
    .cell-placeholder.c1 { background: linear-gradient(135deg,#1a1a1a,#333); }
    .cell-placeholder.c2 { background: linear-gradient(135deg,#0f0f23,#1a1a2e); }
    .cell-placeholder.c3 { background: linear-gradient(135deg,#1c0303,#2d1414); }
    .cell-placeholder.c4 { background: linear-gradient(135deg,#0a1628,#162540); }
    .cell-placeholder.c5 { background: linear-gradient(135deg,#0d1b0d,#1a2e1a); }
    .cell-placeholder.c6 { background: linear-gradient(135deg,#1a1600,#2d2800); }
    .cell-placeholder.c7 { background: linear-gradient(135deg,#1a001a,#2d002d); }

    .placeholder-play {
      width: 48px;
      height: 48px;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.4;
    }
    .placeholder-play svg { width: 16px; height: 16px; fill: white; margin-left: 3px; }

    .cell-overlay {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 16px 18px;
      background: linear-gradient(to top, rgba(0,0,0,0.5) 0%, transparent 55%);
      opacity: 0;
      transition: opacity 0.3s var(--ease);
    }
    .project-cell:hover .cell-overlay { opacity: 1; }
    .project-cell.no-media .cell-overlay {
      opacity: 1;
      background: none;
    }

    .cell-title {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #fff;
      line-height: 1.4;
    }
    .cell-director {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.65);
      margin-top: 2px;
    }
    .project-cell.no-media .cell-title { color: #fff; }
    .project-cell.no-media .cell-director { color: rgba(255,255,255,0.6); }

    /* ---- Custom Cursor ---- */
    .custom-cursor {
      position: fixed;
      top: 0; left: 0;
      width: 58px; height: 58px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.55);
      pointer-events: none;
      z-index: 999;
      transform: translate(-50%, -50%) scale(0);
      transition: transform 0.2s var(--ease), opacity 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(3px);
      opacity: 0;
    }
    .custom-cursor.vis { transform: translate(-50%,-50%) scale(1); opacity: 1; }
    .cursor-label {
      font-size: 8.5px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #fff;
      pointer-events: none;
    }

    /* ---- Project Detail Modal ---- */
    .project-modal {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: #fff;
      overflow-y: auto;
      transform: translateY(100%);
      transition: transform 0.45s var(--ease);
    }
    .project-modal.open {
      transform: translateY(0);
    }
    .modal-header {
      position: sticky;
      top: 0;
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      height: var(--header);
      display: flex;
      align-items: center;
      z-index: 10;
    }
    .modal-back {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      border: none;
      background: none;
      font-family: var(--font);
      transition: color 0.2s;
    }
    .modal-back:hover { color: var(--text); }
    .modal-back svg { width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 1.5; }

    /* 视频英雄区 */
    .modal-hero {
      width: 100%;
      background: #000;
      position: relative;
    }
    .modal-hero video {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
    }
    /* 视频控件 */
    .video-controls-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 48px 20px 16px;
      background: linear-gradient(to top, rgba(0,0,0,0.65) 0%, transparent 100%);
      display: flex;
      align-items: center;
      gap: 12px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .modal-hero:hover .video-controls-bar { opacity: 1; }
    .ctrl-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
    }
    .ctrl-btn svg { width: 18px; height: 18px; fill: white; }
    .progress-track {
      flex: 1;
      height: 2px;
      background: rgba(255,255,255,0.3);
      border-radius: 2px;
      cursor: pointer;
      position: relative;
    }
    .progress-fill {
      height: 100%;
      background: #fff;
      border-radius: 2px;
      width: 0%;
      transition: width 0.1s linear;
      pointer-events: none;
    }
    .ctrl-time {
      font-size: 10px;
      color: rgba(255,255,255,0.7);
      letter-spacing: 0.05em;
      white-space: nowrap;
    }

    /* 信息区 */
    .modal-info {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 24px 60px;
      display: grid;
      grid-template-columns: 1fr 260px;
      gap: 48px;
    }
    .modal-title {
      font-size: 24px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      line-height: 1.15;
    }
    .modal-title-cn {
      font-size: 15px;
      color: var(--muted);
      letter-spacing: 0.08em;
      margin-top: 6px;
    }
    .modal-director {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 12px;
    }
    .modal-desc {
      margin-top: 20px;
      font-size: 13px;
      line-height: 1.75;
      color: #444;
    }
    .modal-desc .cn { margin-top: 10px; color: #666; font-size: 12px; display: block; }
    .modal-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 20px;
    }
    .modal-tag {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: 1px solid var(--border);
      padding: 3px 9px;
      border-radius: 2px;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
    }
    .modal-tag:hover { background: var(--text); color: #fff; border-color: var(--text); }
    /* 制作表 */
    .credits { padding-top: 0; }
    .credit-row {
      display: grid;
      grid-template-columns: 150px 1fr;
      padding: 9px 0;
      border-bottom: 1px solid #f2f2f2;
      font-size: 11px;
      letter-spacing: 0.07em;
    }
    .credit-row:last-child { border-bottom: none; }
    .credit-role { text-transform: uppercase; color: var(--muted); font-size: 10px; letter-spacing: 0.1em; }
    .credit-role-cn { font-size: 10px; color: #bbb; }
    .credit-name { text-transform: uppercase; font-weight: 500; }
    .credit-name-cn { font-size: 11px; color: #555; }

    /* ---- Footer ---- */
    .site-footer { border-top: 1px solid var(--border); margin-top: auto; }
    .ticker-wrap { overflow: hidden; border-bottom: 1px solid var(--border); padding: 12px 0; }
    .ticker {
      display: flex;
      white-space: nowrap;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      animation: tick 22s linear infinite;
      will-change: transform;
    }
    .ticker:hover { animation-play-state: paused; cursor: default; }
    @keyframes tick { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
    .footer-bottom {
      display: flex;
      justify-content: space-between;
      padding: 16px 20px;
    }
    .footer-link { display: flex; flex-direction: column; gap: 3px; transition: opacity 0.2s; }
    .footer-link:hover { opacity: 0.55; }
    .fl-en { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; }
    .fl-cn { font-size: 10px; color: var(--muted); }

    /* ---- 语言控制 ---- */
    body.lang-en .cn-text { display: none !important; }
    body.lang-cn .en-text { display: none !important; }
    body.lang-both .en-text,
    body.lang-both .cn-text { display: block !important; }

    /* ---- 滚动进入动画 ---- */
    .anim { opacity: 0; transform: translateY(18px); transition: opacity 0.5s var(--ease), transform 0.5s var(--ease); }
    .anim.in { opacity: 1; transform: none; }

    /* ---- Responsive ---- */
    /* 手机 — 全屏布局 */
    @media(max-width: 768px) {
      .project-cell.single,
      .project-cell.half,
      .project-cell.tall { height: 56vw; width: 100%; }
      .project-row.double { 
        flex-direction: column; 
        gap: 2px;
      }
      .project-row.double .project-cell.half { height: 56vw; }
      .project-cell.tall { width: 100%; height: auto; aspect-ratio: 9/16; max-height: 80vh; }
      .modal-info { grid-template-columns: 1fr; gap: 24px; padding: 20px 16px 48px; }
      .modal-title { font-size: 18px; }
      .about-wrap { padding: 32px 16px 60px; }
      .about-h1 { font-size: 16px; }
      .about-info-grid { grid-template-columns: 1fr; gap: 6px; }
      .about-info-grid .info-label { display: none; }
      .about-info-grid .info-value::before { content: attr(data-label) "："attr(data-value); }
      /* 确保网格不被footer遮挡 */
      .projects-grid { padding-bottom: 40px; }
    }
    /* iPad — 768px ~ 1024px */
    @media(min-width: 769px) and (max-width: 1024px) {
      .project-cell.single { height: 420px; }
      .project-row.double .project-cell.half { height: 420px; }
      .project-cell.tall { width: 540px; height: 740px; }
    }

    /* ---- Page transition ---- */
    #pageOverlay {
      position: fixed; inset: 0;
      background: #fff;
      z-index: 300;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s var(--ease);
    }
    #pageOverlay.show { opacity: 1; }

    /* ---- About Page ---- */
    .about-wrap {
      display: none;
      margin-top: var(--header);
      flex: 1;
      max-width: 640px;
      margin-left: auto;
      margin-right: auto;
      padding: 48px 24px 80px;
    }
    .about-wrap.active { display: block; }
    .main-content.hidden, .site-footer.hidden { display: none; }
    .about-h1 {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 36px;
      line-height: 1.1;
    }
    .about-body { font-size: 13.5px; line-height: 1.85; color: #444; }
    .about-body .cn { display: block; margin-top: 14px; color: #666; font-size: 12.5px; }
    .about-body p { margin-bottom: 12px; }
    .about-section { margin-bottom: 36px; }
    .about-section h2 {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #000;
      padding-bottom: 10px;
      border-bottom: 1px solid #eee;
      margin-bottom: 16px;
    }
    .about-info-grid {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 8px 24px;
      font-size: 13px;
    }
    .info-label { color: #888; font-size: 12px; letter-spacing: 0.05em; }
    .info-value { color: #222; }
    .about-contacts { margin-top: 52px; padding-top: 28px; border-top: 1px solid var(--border); }
    .about-contacts h3 { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }
    .about-contact-link {
      display: inline-block;
      font-size: 13px;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s;
    }
    .about-contact-link:hover { border-color: var(--text); }

    /* 滚动条 */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }
  </style>
</head>

/* =====================================================
   GRID — 仿 twinbrainsfilms 单/双不规则布局
   single : 全宽独占一行
   double : 两个半宽并排一行（下一个项目自动配对）
   tall   : 竖屏，单格占满，固定宽度居中
   ===================================================== */
function buildGrid() {
  const grid = document.getElementById('grid');
  let i = 0;
  while (i < PROJECTS.length) {
    const p = PROJECTS[i];
    if (p.layout === 'double') {
      // 双格：当前 + 下一个配对
      const next = PROJECTS[i + 1];
      const row = document.createElement('div');
      row.className = 'project-row double anim';
      row.appendChild(makeCell(p, 'half'));
      if (next) {
        row.appendChild(makeCell(next, 'half'));
        i++;
      }
      grid.appendChild(row);
    } else {
      // 单格或竖屏
      const layoutClass = p.layout === 'tall' ? 'tall' : 'single';
      const cell = makeCell(p, layoutClass);
      cell.classList.add('anim');
      grid.appendChild(cell);
    }
    i++;
  }
}

function makeCell(p, type) {
  // type: 'single' | 'half' | 'tall' — 决定 CSS 类
  const cell = document.createElement('article');
  cell.className = `project-cell ${type || 'single'}`;
  cell.dataset.id = p.id;

  // ---- 媒体层 ----
  let mediaHTML;
  if (p.video) {
    // 视频元素：不设置 src，由 IntersectionObserver 懒加载+播放
    // data-clip-start / data-clip-end 控制循环片段
    // 视频2/3/11可能有非16:9比例，添加fill类消除黑边
    const fillClass = ['p2','p3','p11'].includes(p.id) ? ' fill' : '';
    mediaHTML = `<video class="cell-media${fillClass}" muted playsinline preload="none"
      poster="${p.cover || ''}"
      data-src="${p.video}"
      data-clip-start="${p.clipStart != null ? p.clipStart : ''}"
      data-clip-end="${p.clipEnd != null ? p.clipEnd : ''}"></video>`;
  } else if (p.cover) {
    mediaHTML = `<img class="cell-media" src="${p.cover}" alt="${p.title}" loading="lazy">`;
  } else {
    mediaHTML = `<div class="cell-placeholder ${p.colorClass || 'c1'}">
      <div class="placeholder-play">
        <svg viewBox="0 0 20 20"><polygon points="5,3 17,10 5,17"/></svg>
      </div>
    </div>`;
  }

  cell.innerHTML = `
    ${mediaHTML}
    <div class="cell-overlay">
      <div class="cell-title">
        <span class="en-text">${p.title}</span>
        <span class="cn-text" style="display:none">${p.titleCN || p.title}</span>
      </div>
      <div class="cell-director">
        <span class="en-text">${p.director}</span>
        <span class="cn-text" style="display:none">${p.directorCN || p.director}</span>
      </div>
    </div>
  `;

  // ---- 点击打开详情 ----
  cell.addEventListener('click', () => openProject(p));

  // ---- 自定义光标 ----
  const cursor = document.getElementById('cursor');
  cell.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';
    cursor.classList.add('vis');
  });
  cell.addEventListener('mouseleave', () => cursor.classList.remove('vis'));

  return cell;
}

/* =====================================================
   CLIP LOOP — 视频片段循环（核心功能）
   进入视口 → 自动播放指定片段 → 像 gif 一样循环
   ===================================================== */
function setupClipLoop(video) {
  const start = parseFloat(video.dataset.clipStart);
  const end   = parseFloat(video.dataset.clipEnd);
  const hasStart = !isNaN(start);
  const hasEnd   = !isNaN(end);

  if (!hasStart && !hasEnd) {
    // 无 clip 区间：直接 loop 整段
    video.loop = true;
    return;
  }

  // 有 clip 区间：用 timeupdate 手动循环
  video.loop = false;

  // 跳到起点
  if (hasStart) video.currentTime = start;

  const onTimeUpdate = () => {
    // 到达终点或超出 → 跳回起点
    if (hasEnd && video.currentTime >= end) {
      video.currentTime = hasStart ? start : 0;
      video.play().catch(()=>{});
    }
  };

  const onEnded = () => {
    video.currentTime = hasStart ? start : 0;
    video.play().catch(()=>{});
  };

  // 存到元素上，方便清理
  video._clipUpdate = onTimeUpdate;
  video._clipEnded  = onEnded;
  video.addEventListener('timeupdate', onTimeUpdate);
  video.addEventListener('ended', onEnded);
}

function teardownClipLoop(video) {
  if (video._clipUpdate) {
    video.removeEventListener('timeupdate', video._clipUpdate);
    video.removeEventListener('ended', video._clipEnded);
    video._clipUpdate = null;
    video._clipEnded  = null;
  }
}

/* =====================================================
   INTERSECTION OBSERVER — 滚动进视口自动播放
   完全仿照 twinbrainsfilms.com 的行为
   ===================================================== */
let videoObserver = null;

function initVideoObserver() {
  videoObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      const video = entry.target;
      if (entry.isIntersecting) {
        // 进入视口：懒加载 src 并播放
        if (!video.src && video.dataset.src) {
          video.src = video.dataset.src;
          video.load();
          video.addEventListener('loadedmetadata', () => {
            const s = parseFloat(video.dataset.clipStart);
            if (!isNaN(s)) video.currentTime = s;
            setupClipLoop(video);
            video.play().catch(()=>{});
          }, { once: true });
        } else {
          // 已加载过 → 直接播
          const s = parseFloat(video.dataset.clipStart);
          if (!isNaN(s) && (video.currentTime < s || (parseFloat(video.dataset.clipEnd) && video.currentTime >= parseFloat(video.dataset.clipEnd)))) {
            video.currentTime = s;
          }
          if (!video._clipUpdate) setupClipLoop(video);
          video.play().catch(()=>{});
        }
      } else {
        // 离开视口：暂停，节省性能（手机端不暂停，防止卡顿）
        if (window.innerWidth > 768) {
          video.pause();
        }
      }
    });
  }, {
    threshold: 0.1   // 格子露出 10% 就开始播，降低避免卡顿
  });

  // 观察所有网格视频（不包括 modal 里的）
  document.querySelectorAll('.projects-grid video[data-src]').forEach(v => {
    videoObserver.observe(v);
  });
}

// 供 openProject 中的 relatedGrid 单独调用
function observeGridVideos(container) {
  if (!videoObserver) return;
  container.querySelectorAll('video[data-src]').forEach(v => {
    videoObserver.observe(v);
  });
}

    video.src = '';
  }
  
  // 重置hero样式
  hero.style.background = '#000';
  hero.style.aspectRatio = '';
  hero.style.display = '';
  hero.style.alignItems = '';
  hero.style.justifyContent = '';
  
  // 用常量恢复原始hero内容（避免被B站iframe污染）
  hero.innerHTML = ORIGINAL_HERO;
  
  // 重新绑定video元素事件
  const newVideo = document.getElementById('modalVideo');
  if (newVideo) {
    newVideo.addEventListener('loadedmetadata', () => {
      setupClipLoop(newVideo);
    }, { once: true });
  }
  
  document.body.style.overflow = '';
}

/* =====================================================
   VIDEO CONTROLS
   ===================================================== */
function initModalVideoControls() {
  const video = document.getElementById('modalVideo');
  const playBtn = document.getElementById('ctrlPlay');
  const playIcon = document.getElementById('iconPlay');
  const fill = document.getElementById('progressFill');
  const track = document.getElementById('progressTrack');
  const timeEl = document.getElementById('ctrlTime');
  const muteBtn = document.getElementById('ctrlMute');
  const volLines = document.getElementById('volLines');
  const fsBtn = document.getElementById('ctrlFs');

  const fmtT = s => { const m=Math.floor(s/60),sec=Math.floor(s%60).toString().padStart(2,'0'); return `${m}:${sec}`; };

  const togglePlay = () => {
    if (video.paused) {
      video.play().catch(()=>{});
      playIcon.setAttribute('points','3,2 3,18 6,18 6,2 10,2');
      playIcon.setAttribute('d','M3 3h4v14H3zM11 3h4v14h-4z');
    } else {
      video.pause();
      playIcon.setAttribute('points','5,3 17,10 5,17');
    }
  };

  playBtn.onclick = togglePlay;
  video.onclick = togglePlay;

  video.ontimeupdate = () => {
    if (!video.duration) return;
    fill.style.width = (video.currentTime / video.duration * 100) + '%';
    timeEl.textContent = fmtT(video.currentTime) + ' / ' + fmtT(video.duration);
  };

  track.onclick = e => {
    const r = track.getBoundingClientRect();
    video.currentTime = ((e.clientX - r.left) / r.width) * video.duration;
  };

  muteBtn.onclick = () => {
    video.muted = !video.muted;
    volLines.style.display = video.muted ? 'none' : '';
  };

  fsBtn.onclick = () => {
    const hero = document.getElementById('modalHero');
    if (hero.requestFullscreen) hero.requestFullscreen();
    else if (hero.webkitRequestFullscreen) hero.webkitRequestFullscreen();
  };
}

/* =====================================================
   SCROLL ANIMATIONS
   ===================================================== */
function initScrollAnim() {
  const obs = new IntersectionObserver((entries) => {
    entries.forEach((entry, i) => {
      if (entry.isIntersecting) {
        setTimeout(() => entry.target.classList.add('in'), i % 5 * 55);
        obs.unobserve(entry.target);
      }
    });
  }, { threshold: 0.08, rootMargin: '0px 0px -30px 0px' });
  document.querySelectorAll('.anim').forEach(el => obs.observe(el));
}
